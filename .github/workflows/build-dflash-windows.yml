name: Build DFlash Native Windows

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release with the build'
        required: false
        default: 'true'
        type: boolean
  push:
    branches: [main]
    paths:
      - 'dflash/**'
      - '.github/workflows/build-dflash-windows.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dflash/**'
      - '.github/workflows/build-dflash-windows.yml'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '12.6.3'
          method: network

      - name: Verify CUDA Install
        shell: cmd
        run: nvcc --version

      - name: Setup Ninja
        uses: ashutoshvarma/setup-ninja@master
        with:
          version: 1.11.1

      # ── Configure ────────────────────────────────────────────────────
      # Target hardware:
      #   GPU: RTX 3090 (sm_86) + RTX 4090 (sm_89), native cubins for both
      #   CPU: Ryzen 5800X (Zen 3) — AVX2 + FMA + F16C, no AVX-512
      #
      # NOTE: sm_120 (Blackwell/5090) omitted — the pinned llama.cpp fork's
      # ggml-cuda hits ptxas failures on sm_120. Re-add once upstream fixes land.
      #
      # GGML_CUDA_FA_ALL_QUANTS is force-set ON in CMakeLists.txt (line 45)
      # for asymmetric KV-quant (TurboQuant TQ3_0 / Q4_0 paths).
      # OpenMP is auto-detected by CMake for the DDTree parallel top-K path.
      - name: Configure CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd dflash
          cmake -B build -S . -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=cl ^
            -DCMAKE_CXX_COMPILER=cl ^
            -DCMAKE_CUDA_ARCHITECTURES="86;89" ^
            -DCMAKE_CUDA_FLAGS="-diag-suppress=177,221" ^
            -DGGML_CUDA=ON ^
            -DGGML_AVX2=ON ^
            -DGGML_AVX512=OFF ^
            -DGGML_FMA=ON ^
            -DGGML_F16C=ON

      - name: Build DFlash
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd dflash
          cmake --build build --config Release -j %NUMBER_OF_PROCESSORS%

      - name: List Build Outputs
        shell: cmd
        run: |
          dir /s /b dflash\build\*.exe
          dir /s /b dflash\build\*.dll

      # ── Package a self-contained release directory ───────────────────
      # Layout:
      #   dflash-windows/
      #   ├── bin/          executables + all DLLs (flat, no DLL search issues)
      #   ├── scripts/      Python helpers (run.py, server.py, bench_llm.py, …)
      #   ├── examples/     chat.py
      #   └── README.md
      - name: Assemble Release Package
        shell: pwsh
        run: |
          $pkg = "dflash-windows"
          New-Item -ItemType Directory -Force "$pkg/bin"

          # Executables
          Copy-Item dflash/build/*.exe "$pkg/bin/"

          # DLLs: ggml-base, ggml-cuda, ggml-cpu, ggml (loader)
          Get-ChildItem -Recurse dflash/build -Filter *.dll | Copy-Item -Destination "$pkg/bin/"

          # Python scripts and examples
          Copy-Item -Recurse dflash/scripts "$pkg/scripts"
          Copy-Item -Recurse dflash/examples "$pkg/examples"

          # Documentation
          Copy-Item dflash/README.md "$pkg/"
          Copy-Item dflash/RESULTS.md "$pkg/"
          Copy-Item dflash/QUICKSTART_WINDOWS.md "$pkg/"

          Write-Host "=== Release package contents ==="
          Get-ChildItem -Recurse $pkg | ForEach-Object { $_.FullName }

          # Zip for release
          Compress-Archive -Path "$pkg/*" -DestinationPath "$pkg.zip" -Force

      - name: Upload Artifact (expires in 14 days)
        uses: actions/upload-artifact@v4
        with:
          name: dflash-windows-sm86-sm89-avx2
          path: dflash-windows/
          retention-days: 14

      # ── GitHub Release (permanent, on workflow_dispatch) ─────────────
      - name: Generate Release Tag
        if: github.event_name == 'workflow_dispatch' && inputs.create_release == 'true'
        id: tag
        shell: pwsh
        run: |
          $tag = "dflash-win-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "Generated release tag: $tag"

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' && inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "DFlash Windows Build (${{ steps.tag.outputs.tag }})"
          body: |
            ## DFlash Windows Build

            **CUDA architectures:** sm_86 (RTX 3090) + sm_89 (RTX 4090)
            **CPU ISA:** AVX2 + FMA + F16C (Zen 3+ / Intel 4th gen+)
            **CUDA toolkit:** 12.6.3
            **Commit:** ${{ github.sha }}

            ### Quick start

            1. Unzip `dflash-windows.zip`
            2. Download models:
               ```
               pip install huggingface-hub
               huggingface-cli download unsloth/Qwen3.5-27B-GGUF Qwen3.5-27B-Q4_K_M.gguf --local-dir models/
               huggingface-cli download z-lab/Qwen3.5-27B-DFlash model.safetensors --local-dir models/draft/
               ```
            3. Run:
               ```
               python scripts/run.py --prompt "def fibonacci(n):" --bin bin/test_dflash.exe
               ```

            ### What's inside

            | File | Purpose |
            |------|---------|
            | `bin/test_dflash.exe` | DFlash speculative decoder (DDTree, TurboQuant, server mode) |
            | `bin/test_generate.exe` | Standalone autoregressive decoder |
            | `bin/*.dll` | ggml runtime (CUDA, CPU backends) |
            | `scripts/run.py` | Streaming one-shot generation |
            | `scripts/server.py` | OpenAI-compatible HTTP server |
            | `scripts/bench_llm.py` | Reproduce paper benchmarks |
            | `examples/chat.py` | Multi-turn chat REPL |

            See [README.md](https://github.com/${{ github.repository }}/tree/main/dflash) for full documentation.
          files: dflash-windows.zip
          draft: false
          prerelease: false
          make_latest: true
